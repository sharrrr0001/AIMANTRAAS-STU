# Docker Compose Configuration
# ============================
# For local development with Docker

version: '3.8'

services:
  backend:
    build: .
    container_name: ai-mantraas-backend
    ports:
      - "5000:5000"
    environment:
      - DEBUG_MODE=True
      - FLASK_APP=app.py
      - PORT=5000
    env_file:
      - .env
    volumes:
      - ./local-data:/app/local-data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend static server (optional)
  frontend:
    image: nginx:alpine
    container_name: ai-mantraas-frontend
    ports:
      - "8000:80"
    volumes:
      - ../index.html:/usr/share/nginx/html/index.html:ro
      - ../for-business.html:/usr/share/nginx/html/for-business.html:ro
      - ../bglogo.png:/usr/share/nginx/html/bglogo.png:ro
    restart: unless-stopped

# Networks for container communication
networks:
  default:
    name: ai-mantraas-network
